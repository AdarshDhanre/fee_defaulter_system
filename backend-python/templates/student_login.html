<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Fee System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* Student specific gradient (Blue/Teal) to differentiate from admin */
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #06b6d4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            display: flex;
            background: rgba(30, 30, 47, 0.95);
            backdrop-filter: blur(10px);
            color: #ffffff;
            width: 900px;
            max-width: 90%;
            height: 550px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: scaleIn 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Left Side: Completely replaced with College Image/Logo */
        .left-side {
            flex: 1;
            background: url('/static/img/college_bg.jpg') no-repeat center center;
            background-size: contain; /* Ensures the whole logo is visible */
            background-color: #ffffff; /* Keeping the image background white if the logo is not transparent, but adding border radius */
            border-radius: 15px;
            margin: 30px; /* Adds breathing room around the logo */
        }

        /* Right Side: Login Form */
        .right-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            position: relative;
        }

        .right-side h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #bfdbfe;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-container {
            width: 100%;
            max-width: 320px;
        }

        .input-group-custom {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            color: #93c5fd;
            font-size: 1.2rem;
        }

        .form-control {
            width: 100%;
            background: #2a2a40;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 14px 20px 14px 55px;
            font-size: 1rem;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #8b8b99;
        }

        .form-control:focus {
            background: #32324e;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
            outline: none;
            color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(90deg, #2563eb, #06b6d4);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            width: 180px;
            display: block;
            margin: 30px auto 0;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .links-container {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
        }

        .links-container a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links-container a:hover {
            color: #06b6d4;
        }

        .alert-custom {
            border-radius: 15px;
            font-size: 0.85rem;
            padding: 10px 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                height: auto;
                width: 90%;
            }
            .left-side {
                height: 250px;
                flex: none;
            }
            .right-side {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Left Side: College Logo/Image filling the entire box -->
    <div class="left-side"></div>

    <!-- Right Side: Login Form -->
    <div class="right-side">
        <div class="form-container">

            <h2 id="loginTitle" class="text-center">Student Portal Login</h2>

            {% if error %}
            <div class="alert alert-danger alert-custom" role="alert" id="error-alert">
                {{ error }}
            </div>
            <script>
                setTimeout(() => {
                    const errorAlert = document.getElementById('error-alert');
                    if(errorAlert) {
                        errorAlert.style.transition = 'opacity 0.5s ease';
                        errorAlert.style.opacity = '0';
                        setTimeout(() => errorAlert.style.display = 'none', 500);
                    }
                }, 3000);
                if (window.history.replaceState) {
                    window.history.replaceState(null, null, window.location.href);
                }
            </script>
            {% endif %}

            <!-- Student Form -->
            <form method="POST" action="/student_login" id="studentForm">
                <div class="input-group-custom">
                    <i class="bi bi-person-badge"></i>
                    <input type="text" name="roll_no" class="form-control" placeholder="Enter Roll Number" required>
                </div>

                <div class="input-group-custom">
                    <i class="bi bi-envelope"></i>
                    <input type="email" name="email" class="form-control" placeholder="Registered Email ID" required>
                </div>

                <button class="btn btn-login" type="submit" id="submitBtnStudent">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

        </div>
    </div>
</div>

<script>
    // Loading state on submit
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        if(this.checkValidity()) {
            const btn = document.getElementById('submitBtnStudent');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
            btn.disabled = true;
        }
    });
</script>

</body>
</html>
