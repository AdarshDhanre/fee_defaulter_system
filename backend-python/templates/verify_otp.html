<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - Fee System</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 40px;
            border-radius: 15px;
            width: 380px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            text-align: center;
            font-size: 24px;
            letter-spacing: 5px;
        }

        .form-control::placeholder {
            color: #ddd;
            font-size: 16px;
            letter-spacing: normal;
        }

        .form-control:focus {
            box-shadow: none;
            background: rgba(255,255,255,0.3);
            color: white;
        }

        .btn-login {
            background: #28a745;
            border: none;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #218838;
        }

        h2 {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>📧 Verify Email</h2>
    <p style="font-size: 14px; margin-bottom: 25px;">Enter the 6-digit OTP sent to<br><b>{{ email }}</b></p>

    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-4">
            <input type="text" name="otp" class="form-control" placeholder="• • • • • •" maxlength="6" required autofocus>
        </div>

        <button class="btn btn-login w-100 btn-lg">Verify & Login</button>
    </form>
    
    <p class="text-center mt-3" style="font-size: 13px;">
        <a href="/register" style="color: #ff9500; text-decoration: none;">Try a different email?</a>
    </p>
</div>

</body>
</html>
