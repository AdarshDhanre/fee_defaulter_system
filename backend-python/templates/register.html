<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - Fee System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* Same Purple to pink gradient background as login page */
            background: linear-gradient(135deg, #6b52d1 0%, #b862c9 50%, #f77c8e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            display: flex;
            background: rgba(30, 30, 47, 0.95);
            backdrop-filter: blur(10px);
            color: #ffffff;
            width: 900px;
            max-width: 90%;
            height: 550px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: scaleIn 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Left Side: College Image/Logo */
        .left-side {
            flex: 1;
            background: url('/static/img/college_bg.jpg') no-repeat center center;
            background-size: contain; 
            background-color: #ffffff; 
            border-radius: 15px;
            margin: 30px; 
        }

        /* Right Side: Registration Form */
        .right-side {
            flex: 1;
            padding: 40px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            position: relative;
        }

        .right-side h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e2d8fa;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .form-container {
            width: 100%;
            max-width: 320px;
        }

        .input-group-custom {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            color: #b39ddb;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            background: #2a2a40;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px 20px 12px 50px;
            font-size: 0.95rem;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #8b8b99;
        }

        .form-control:focus {
            background: #32324e;
            box-shadow: 0 0 0 3px rgba(179, 157, 219, 0.3);
            border-color: rgba(179, 157, 219, 0.5);
            outline: none;
            color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(90deg, #9b51e0, #de5eb0);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            display: block;
            margin: 25px auto 0;
            box-shadow: 0 10px 20px rgba(155, 81, 224, 0.3);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(155, 81, 224, 0.4);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .links-container {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
        }

        .links-container a {
            color: #b39ddb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links-container a:hover {
            color: #de5eb0;
        }

        .alert-custom {
            border-radius: 15px;
            font-size: 0.85rem;
            padding: 10px 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                height: auto;
                width: 90%;
            }
            .left-side {
                height: 250px;
                flex: none;
            }
            .right-side {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Left Side: College Logo/Image filling the entire box -->
    <div class="left-side"></div>

    <!-- Right Side: Registration Form -->
    <div class="right-side">
        <div class="form-container">
            <h2>Create Admin Account</h2>

            {% if error %}
            <div class="alert alert-danger alert-custom" role="alert" id="error-alert">
                {{ error }}
            </div>
            <script>
                setTimeout(() => {
                    const errorAlert = document.getElementById('error-alert');
                    if(errorAlert) {
                        errorAlert.style.transition = 'opacity 0.5s ease';
                        errorAlert.style.opacity = '0';
                        setTimeout(() => errorAlert.style.display = 'none', 500);
                    }
                }, 3000);
                if (window.history.replaceState) {
                    window.history.replaceState(null, null, window.location.href);
                }
            </script>
            {% endif %}

            <div class="alert alert-danger alert-custom" role="alert" id="js-error-alert" style="display: none;"></div>

            <form method="POST" id="registerForm">
                <div class="input-group-custom">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" class="form-control" placeholder="Choose a Username" required>
                </div>

                <div class="input-group-custom">
                    <i class="bi bi-envelope"></i>
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>

                <div class="input-group-custom">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Create Password" required minlength="6">
                </div>

                <!-- Password Guidance Box -->
                <div class="p-2 mb-3 text-start" style="background: rgba(24, 24, 38, 0.8); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; color: #b39ddb;">
                    <div style="font-weight: 500; margin-bottom: 3px;">Password Requirements:</div>
                    <div id="reqCapital">• First letter MUST be Capital (A-Z)</div>
                    <div id="reqSpecial">• Contains at least 1 Special Char (@, #, $, etc.)</div>
                    <div id="reqLength">• Minimum 6 characters long</div>
                </div>

                <button class="btn btn-login" type="submit" id="submitBtn">
                    Sign Up & Verify <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>

            <div class="links-container">
                Already have an account? <br>
                <a href="/" style="font-weight: 600; font-size: 1rem; display: inline-block; margin-top: 5px;">Log in here</a>
            </div>
        </div>
    </div>
</div>

<script>
    const passInput = document.getElementById('passwordInput');
    const reqCap = document.getElementById('reqCapital');
    const reqSpec = document.getElementById('reqSpecial');
    const reqLen = document.getElementById('reqLength');
    const jsError = document.getElementById('js-error-alert');

    passInput.addEventListener('input', function() {
        const val = this.value;
        const hasCap = /^[A-Z]/.test(val);
        const hasSpec = /[^a-zA-Z0-9]/.test(val);
        const hasLen = val.length >= 6;

        reqCap.style.color = hasCap ? '#34d399' : '#b39ddb';
        reqCap.innerText = (hasCap ? '✓ ' : '• ') + 'First letter MUST be Capital (A-Z)';

        reqSpec.style.color = hasSpec ? '#34d399' : '#b39ddb';
        reqSpec.innerText = (hasSpec ? '✓ ' : '• ') + 'Contains at least 1 Special Char (@, #, $, etc.)';

        reqLen.style.color = hasLen ? '#34d399' : '#b39ddb';
        reqLen.innerText = (hasLen ? '✓ ' : '• ') + 'Minimum 6 characters long';
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const val = passInput.value;
        const hasCap = /^[A-Z]/.test(val);
        const hasSpec = /[^a-zA-Z0-9]/.test(val);
        const hasLen = val.length >= 6;

        if (!hasCap) {
            e.preventDefault();
            jsError.innerText = "Password must start with a Capital letter (A-Z)!";
            jsError.style.display = 'block';
            return;
        }

        if (!hasSpec) {
            e.preventDefault();
            jsError.innerText = "Password must contain at least one special character!";
            jsError.style.display = 'block';
            return;
        }

        if (!hasLen) {
            e.preventDefault();
            jsError.innerText = "Password must be at least 6 characters long!";
            jsError.style.display = 'block';
            return;
        }

        jsError.style.display = 'none';

        if(this.checkValidity()) {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending OTP...';
            btn.disabled = true;
        }
    });
</script>

</body>
</html>
