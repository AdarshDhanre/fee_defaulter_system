<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Defaulter System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* Modern Realistic Sidebar Layout */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            background: #0f172a; /* matches the global background */
            overflow: hidden; /* we handle scrolling in main content instead */
        }

        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1.5rem;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            z-index: 1000;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .sidebar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #f8fafc;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .sidebar-brand:hover {
            color: #ffffff;
            transform: scale(1.05);
        }

        .sidebar-brand i {
            color: #8b5cf6;
            font-size: 2.2rem;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.8));
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .nav-item i {
            font-size: 1.3rem;
            transition: all 0.3s ease;
            color: #64748b;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.15);
            color: #ffffff;
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: inset 0 0 15px rgba(139, 92, 246, 0.1);
            transform: translateX(5px);
        }

        .nav-item:hover i, .nav-item.active i {
            color: #8b5cf6;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6));
        }

        /* Specific link colors */
        .nav-item.defaulters-link:hover, .nav-item.defaulters-link.active {
            background: rgba(244, 63, 94, 0.15);
            border-color: rgba(244, 63, 94, 0.3);
            box-shadow: inset 0 0 15px rgba(244, 63, 94, 0.1);
        }
        .nav-item.defaulters-link:hover i, .nav-item.defaulters-link.active i {
            color: #f43f5e;
            filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.6));
        }

        .nav-item.reports-link:hover, .nav-item.reports-link.active {
            background: rgba(234, 179, 8, 0.15);
            border-color: rgba(234, 179, 8, 0.3);
            box-shadow: inset 0 0 15px rgba(234, 179, 8, 0.1);
        }
        .nav-item.reports-link:hover i, .nav-item.reports-link.active i {
            color: #eab308;
            filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.6));
        }

        .nav-item.danger-link {
            margin-top: auto;
        }

        .nav-item.danger-link:hover {
            background: rgba(255, 8, 68, 0.15);
            border-color: rgba(255, 8, 68, 0.3);
            color: #ffffff;
            box-shadow: inset 0 0 15px rgba(255, 8, 68, 0.1);
            transform: translateX(0) scale(1.02);
        }

        .nav-item.danger-link:hover i {
            color: #ff0844;
            filter: drop-shadow(0 0 8px rgba(255, 8, 68, 0.6));
        }

        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            height: 100vh;
            overflow-y: auto;
            padding: 2.5rem 3.5rem;
            scroll-behavior: smooth;
        }

        /* Hide old navbar if any */
        .navbar {
            display: none !important;
        }

        /* Scrollbar styles for modern look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.8);
        }

        /* Reset container to fit perfectly inside main-content without top margin issue */
        .container {
            max-width: 1200px !important;
            margin-top: 0 !important;
        }
    </style>
</head>

<body>

<!-- Realistic Glassmorphism Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <a href="/dashboard" class="sidebar-brand">
            <i class="bi bi-bank"></i>
            Fee System
        </a>
    </div>

    <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">
            <i class="bi bi-grid-1x2-fill"></i>
            Dashboard
        </a>
        <a href="/students" class="nav-item">
            <i class="bi bi-people-fill"></i>
            Students
        </a>
        <a href="/fees" class="nav-item">
            <i class="bi bi-wallet2"></i>
            Fees
        </a>
        <a href="/payments" class="nav-item">
            <i class="bi bi-receipt-cutoff"></i>
            Payments
        </a>
        <a href="/defaulters" class="nav-item defaulters-link">
            <i class="bi bi-exclamation-triangle-fill"></i>
            Defaulters
        </a>
        <a href="/reports" class="nav-item reports-link">
            <i class="bi bi-file-earmark-bar-graph-fill"></i>
            Reports
        </a>

        <a href="/logout" class="nav-item danger-link">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>
    </nav>
</aside>

<!-- Main Container where other templates load -->
<div class="main-content">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/static/js/script.js"></script>

<script>
    // Add active class to current nav item based on URL
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        
        navItems.forEach(item => {
            if (item.getAttribute('href') === currentPath) {
                item.classList.add('active');
            }
        });
    });
</script>

</body>
</html>
